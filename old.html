<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Garden ASCII Diagram</title>
  </head>
  <body>
    <main id="app">
      <canvas id="three"></canvas>
      <canvas id="ascii"></canvas>
      <button class="mode-toggle" type="button" aria-pressed="false">activate ascii</button>
      <section class="caption" aria-label="Cloud gardening diagram">
        <p class="kicker">cloud-gardening diagram</p>
        <h1>Clouds condense into ASCII rain, mirrored as gardens.</h1>
      </section>
      <aside class="legend" aria-label="Water cycle labels">
        <span>cloud formation</span>
        <span>glyph rain</span>
        <span>mirror garden</span>
      </aside>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
